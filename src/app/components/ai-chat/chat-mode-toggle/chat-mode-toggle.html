<!-- Toggle button for switching between floating and sidebar modes -->
<button
    type="button"
    (click)="toggle()"
    class="inline-flex h-8 w-8 items-center justify-center rounded-md text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground"
    [attr.aria-label]="viewModeService.isSidebar() ? 'Switch to floating mode' : 'Switch to sidebar mode'"
    [attr.title]="viewModeService.isSidebar() ? 'Switch to floating mode' : 'Switch to sidebar mode'"
>
    @if (viewModeService.isSidebar()) {
        <!-- Floating icon (minimize/picture-in-picture style) -->
        <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25"
            />
        </svg>
    } @else {
        <!-- Sidebar icon (expand/fullscreen to side style) -->
        <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"
            />
        </svg>
    }
</button>
