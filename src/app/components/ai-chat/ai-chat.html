<!-- Floating Chat Button -->
<button
  (click)="toggleChat()"
  class="fixed bottom-6 right-6 z-50 flex h-14 w-14 items-center justify-center rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg transition-all hover:scale-105 hover:shadow-xl"
>
  @if (isOpen()) {
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  } @else {
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
    </svg>
  }
</button>

<!-- Chat Window -->
@if (isOpen()) {
  <div class="fixed bottom-24 right-6 z-50 flex h-[500px] w-[380px] flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl">
    <!-- Header -->
    <div class="flex items-center gap-3 border-b border-slate-100 bg-gradient-to-r from-indigo-600 to-purple-600 px-4 py-4 text-white">
      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-white/20">
        <span class="text-lg">🤖</span>
      </div>
      <div class="flex-1">
        <h3 class="font-semibold">Kook Assistent</h3>
        <p class="text-xs text-white/80">Altijd klaar om te helpen</p>
      </div>
      <button (click)="toggleChat()" class="rounded-lg p-1 transition-colors hover:bg-white/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div #messagesContainer class="flex-1 space-y-4 overflow-y-auto p-4">
      @for (message of messages(); track message.timestamp) {
        <div class="flex" [class.justify-end]="message.role === 'user'">
          <div
            class="max-w-[85%] rounded-2xl px-4 py-2.5"
            [class.bg-gradient-to-r]="message.role === 'user'"
            [class.from-indigo-600]="message.role === 'user'"
            [class.to-purple-600]="message.role === 'user'"
            [class.text-white]="message.role === 'user'"
            [class.bg-slate-100]="message.role === 'assistant'"
            [class.text-slate-700]="message.role === 'assistant'"
          >
            <p class="whitespace-pre-wrap text-sm leading-relaxed">{{ message.content }}</p>
          </div>
        </div>
      }

      @if (isLoading()) {
        <div class="flex">
          <div class="rounded-2xl bg-slate-100 px-4 py-3">
            <div class="flex gap-1">
              <span class="h-2 w-2 animate-bounce rounded-full bg-slate-400" style="animation-delay: 0ms"></span>
              <span class="h-2 w-2 animate-bounce rounded-full bg-slate-400" style="animation-delay: 150ms"></span>
              <span class="h-2 w-2 animate-bounce rounded-full bg-slate-400" style="animation-delay: 300ms"></span>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Input -->
    <div class="border-t border-slate-100 bg-slate-50 p-4">
      <div class="flex gap-2">
        <input
          type="text"
          [value]="inputMessage()"
          (input)="updateInput($event)"
          (keydown)="handleKeydown($event)"
          placeholder="Typ je ingrediënten..."
          class="flex-1 rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm outline-none transition-all placeholder:text-slate-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
        />
        <button
          (click)="sendMessage()"
          [disabled]="isLoading() || !inputMessage().trim()"
          class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white transition-all hover:opacity-90 disabled:opacity-50"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
        </button>
      </div>
      <p class="mt-2 text-center text-xs text-slate-400">Probeer: "Ik heb tomaten en komkommer"</p>
    </div>
  </div>
}
