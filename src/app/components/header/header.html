<header class="header">
  <div class="container header__container">
    <a routerLink="/" class="header__logo">
      <span class="header__logo-icon">🤌</span>
      <span class="header__logo-text">Pinch</span>
    </a>

    <nav class="header__nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/recipes" routerLinkActive="active">Recepten</a>
      <a routerLink="/categories" routerLinkActive="active">Categorieën</a>
    </nav>

    <div class="header__actions">
      <button class="header__search-btn" (click)="toggleSearch()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
      </button>
      <a routerLink="/new" class="btn btn--primary">+ Recept</a>
    </div>

    <button class="header__mobile-toggle" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  @if (isSearchOpen()) {
    <div class="header__search-bar">
      <div class="container">
        <input type="text" placeholder="Zoek recepten..." autofocus />
      </div>
    </div>
  }
</header>
