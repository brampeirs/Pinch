<header class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/80 backdrop-blur-lg">
    <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-6">
        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2">
            <span class="text-2xl">🤌</span>
            <span class="text-xl font-bold text-slate-900">Pinch</span>
        </a>

        <!-- Navigation -->
        <nav class="hidden items-center gap-8 md:flex">
            <a
                routerLink="/"
                routerLinkActive="text-slate-900"
                [routerLinkActiveOptions]="{ exact: true }"
                class="text-sm font-medium text-slate-500 transition-colors hover:text-slate-900"
            >
                Home
            </a>
            <a
                routerLink="/recipes"
                routerLinkActive="text-slate-900"
                class="text-sm font-medium text-slate-500 transition-colors hover:text-slate-900"
            >
                Recipes
            </a>
            <a
                routerLink="/categories"
                routerLinkActive="text-slate-900"
                class="text-sm font-medium text-slate-500 transition-colors hover:text-slate-900"
            >
                Categories
            </a>
        </nav>

        <!-- Actions -->
        <div class="flex items-center gap-3">
            <button
                (click)="toggleSearch()"
                class="flex h-9 w-9 items-center justify-center rounded-lg text-slate-400 transition-colors hover:bg-slate-100 hover:text-slate-600"
            >
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <circle cx="11" cy="11" r="8" stroke-width="1.5" />
                    <path d="m21 21-4.3-4.3" stroke-width="1.5" />
                </svg>
            </button>
            <a
                routerLink="/recipes/new"
                class="hidden rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition-all hover:bg-slate-800 sm:inline-flex"
            >
                New recipe
            </a>
        </div>

        <!-- Mobile toggle -->
        <button (click)="toggleMenu()" class="flex flex-col gap-1 p-2 md:hidden">
            <span class="block h-0.5 w-5 bg-slate-600"></span>
            <span class="block h-0.5 w-5 bg-slate-600"></span>
            <span class="block h-0.5 w-5 bg-slate-600"></span>
        </button>
    </div>

    <!-- Search overlay -->
    @if (isSearchOpen()) {
        <div class="border-t border-slate-100 bg-white p-4">
            <div class="mx-auto max-w-2xl">
                <input
                    type="text"
                    placeholder="Search recipes..."
                    autofocus
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 placeholder-slate-400 outline-none transition-colors focus:border-indigo-500 focus:bg-white"
                />
            </div>
        </div>
    }
</header>
