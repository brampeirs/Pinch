<a
  [routerLink]="['/recipes', recipe().id]"
  class="group block overflow-hidden rounded-2xl bg-white ring-1 ring-slate-200/60 transition-all hover:-translate-y-1 hover:shadow-xl hover:ring-slate-300"
>
  <!-- Image -->
  <div class="relative aspect-[4/3] overflow-hidden bg-slate-100">
    <img
      [src]="displayImage()"
      [alt]="recipe().title"
      class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"
    />
    <span
      class="absolute left-3 top-3 rounded-full bg-white/90 px-3 py-1 text-xs font-semibold text-slate-700 backdrop-blur-sm"
    >
      {{ recipe().category }}
    </span>
  </div>

  <!-- Content -->
  <div class="p-5">
    <h3
      class="mb-2 text-lg font-semibold text-slate-900 transition-colors group-hover:text-indigo-600"
    >
      {{ recipe().title }}
    </h3>
    <p class="mb-4 line-clamp-2 text-sm text-slate-500">
      {{ recipe().description }}
    </p>
    <div class="flex items-center gap-1 text-sm text-slate-400">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <circle cx="12" cy="12" r="10" stroke-width="1.5" />
        <polyline points="12 6 12 12 16 14" stroke-width="1.5" />
      </svg>
      <span>{{ recipe().prepTime + recipe().cookTime }} min</span>
    </div>
  </div>
</a>
