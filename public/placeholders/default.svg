<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="url(#grad-default)"/>
  <defs>
    <linearGradient id="grad-default" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Chef hat -->
  <g transform="translate(200, 120)">
    <ellipse cx="0" cy="30" rx="40" ry="10" fill="#94a3b8"/>
    <path d="M-40,30 L-40,10 Q-40,-30 0,-30 Q40,-30 40,10 L40,30" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <ellipse cx="-20" cy="-15" rx="15" ry="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <ellipse cx="20" cy="-15" rx="15" ry="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <ellipse cx="0" cy="-25" rx="18" ry="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  </g>
  <!-- Utensils crossed -->
  <g transform="translate(200, 180)" stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
    <line x1="-30" y1="-20" x2="30" y2="20"/>
    <line x1="30" y1="-20" x2="-30" y2="20"/>
  </g>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui" font-size="14" fill="#64748b" opacity="0.5">Recipe</text>
</svg>

