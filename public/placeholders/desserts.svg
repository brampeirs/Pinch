<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="url(#grad-dessert)"/>
  <defs>
    <linearGradient id="grad-dessert" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
  </defs>
  <!-- Cupcake base -->
  <g transform="translate(200, 160)">
    <path d="M-35,20 L-30,-10 L30,-10 L35,20 Q35,35 0,35 Q-35,35 -35,20" fill="#a16207" opacity="0.6"/>
    <path d="M-35,20 L-30,-10 L30,-10 L35,20" fill="none" stroke="#92400e" stroke-width="2"/>
  </g>
  <!-- Frosting -->
  <g transform="translate(200, 130)">
    <ellipse cx="0" cy="10" rx="35" ry="15" fill="#ec4899" opacity="0.7"/>
    <ellipse cx="-12" cy="-5" rx="20" ry="12" fill="#f472b6" opacity="0.8"/>
    <ellipse cx="12" cy="-5" rx="20" ry="12" fill="#f472b6" opacity="0.8"/>
    <ellipse cx="0" cy="-15" rx="15" ry="10" fill="#f9a8d4" opacity="0.9"/>
  </g>
  <!-- Cherry -->
  <circle cx="200" cy="105" r="8" fill="#dc2626"/>
  <path d="M200,97 Q205,85 210,80" stroke="#166534" stroke-width="2" fill="none"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui" font-size="14" fill="#9d174d" opacity="0.5">Desserts</text>
</svg>

