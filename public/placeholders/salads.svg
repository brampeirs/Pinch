<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="url(#grad-salad)"/>
  <defs>
    <linearGradient id="grad-salad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
  </defs>
  <!-- Bowl -->
  <g transform="translate(200, 160)">
    <ellipse cx="0" cy="15" rx="65" ry="22" fill="#16a34a" opacity="0.2"/>
    <path d="M-65,0 Q-65,40 0,40 Q65,40 65,0" stroke="#16a34a" stroke-width="4" fill="#f0fdf4"/>
  </g>
  <!-- Leaves -->
  <g transform="translate(200, 130)" fill="#22c55e" opacity="0.7">
    <ellipse cx="-25" cy="-10" rx="20" ry="10" transform="rotate(-30 -25 -10)"/>
    <ellipse cx="15" cy="-15" rx="22" ry="11" transform="rotate(20 15 -15)"/>
    <ellipse cx="-10" cy="5" rx="18" ry="9" transform="rotate(-10 -10 5)"/>
    <ellipse cx="30" cy="0" rx="15" ry="8" transform="rotate(40 30 0)"/>
  </g>
  <!-- Tomato -->
  <circle cx="175" cy="120" r="12" fill="#ef4444" opacity="0.8"/>
  <circle cx="220" cy="140" r="10" fill="#ef4444" opacity="0.6"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui" font-size="14" fill="#166534" opacity="0.5">Salads</text>
</svg>

